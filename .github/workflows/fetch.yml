name: Sync 1365 Live Data

on:
  workflow_dispatch:
  schedule:
    # KST 00:00, 06:00, 12:00, 18:00
    - cron: "0 15,21,3,9 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    concurrency:
      group: sync-1365-live
      cancel-in-progress: true
    defaults:
      run:
        working-directory: backend
    env:
      H1365_SERVICE_KEY: ${{ secrets.H1365_SERVICE_KEY }}
      H1365_PAGE_SIZE: "100"
      H1365_MAX_PAGES: "50"
      H1365_MAX_ITEMS: "2000"
      H1365_SIDO_CODE: "6110000"
      H1365_SHARD_SEOUL_DISTRICTS: "true"
      H1365_RECRUITING_ONLY: "true"
      H1365_ENRICH_DETAIL_COUNTS: "true"
      H1365_DETAIL_CONCURRENCY: "12"
      H1365_MAX_DETAIL: "all"
      H1365_REQUEST_TIMEOUT_SECONDS: "20"
      ENABLE_DB_SYNC: "false"
      SIMILAR_TOP_K: "20"
      SIMILAR_BATCH_SIZE: "64"
      HF_HOME: ${{ github.workspace }}/.hf-cache
      SENTENCE_TRANSFORMERS_HOME: ${{ github.workspace }}/.hf-cache/sentence-transformers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Cache embedding models
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.hf-cache
          key: ${{ runner.os }}-hf-${{ env.SIMILAR_TOP_K }}-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Validate required secrets
        run: |
          test -n "$H1365_SERVICE_KEY" || (echo "H1365_SERVICE_KEY secret is missing" && exit 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live sync
        run: python scripts/sync_1365.py

      - name: Generate similar posts
        run: python scripts/generate_similar_posts.py

      - name: Commit updated JSON
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/volunteer_posts.json
          git add backend/data/detail_cache.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update volunteer posts json"
          git push
