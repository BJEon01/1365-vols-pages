name: Sync 1365 Live Data

on:
  workflow_dispatch:
  schedule:
    # KST 08:00, daily
    - cron: "0 23 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    concurrency:
      group: sync-1365-live
      cancel-in-progress: true
    defaults:
      run:
        working-directory: backend
    env:
      H1365_SERVICE_KEY: ${{ secrets.H1365_SERVICE_KEY }}
      H1365_PAGE_SIZE: "100"
      H1365_MAX_PAGES: "50"
      H1365_SIDO_CODE: "6110000"
      H1365_SHARD_SEOUL_DISTRICTS: "true"
      H1365_RECRUITING_ONLY: "true"
      H1365_ENRICH_DETAIL_COUNTS: "true"
      H1365_DETAIL_CONCURRENCY: "12"
      H1365_MAX_DETAIL: "300"
      H1365_REQUEST_TIMEOUT_SECONDS: "20"
      ENABLE_DB_SYNC: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Validate required secrets
        run: |
          test -n "$H1365_SERVICE_KEY" || (echo "H1365_SERVICE_KEY secret is missing" && exit 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live sync
        run: python scripts/sync_1365.py

      - name: Commit updated JSON
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/volunteer_posts.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update volunteer posts json"
          git push
